<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000">
  <defs>
    <!-- Linen/cream background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3EFE4"/>
      <stop offset="50%" stop-color="#EDE8DD"/>
      <stop offset="100%" stop-color="#F3EFE4"/>
    </linearGradient>
    <!-- Subtle warm vignette -->
    <radialGradient id="vignette" cx="50%" cy="55%" r="60%">
      <stop offset="0%" stop-color="#C8A45A" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#0D1B2A" stop-opacity="0.03"/>
    </radialGradient>
    <!-- Bottom fade -->
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="60%" stop-color="#0D1B2A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0D1B2A" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="1000" fill="url(#bg)"/>
  <rect width="800" height="1000" fill="url(#vignette)"/>
  <rect width="800" height="1000" fill="url(#bottomFade)"/>

  <!-- Fish silhouette, centered, refined single-stroke outline -->
  <g transform="translate(400, 480)" opacity="0.12">
    <g transform="scale(1.8)" stroke="#A8833D" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Body -->
      <path d="
        M -80,0
        C -60,-36 -20,-52 30,-44
        C 55,-38 72,-24 80,-4
        C 82,2 82,6 80,12
        C 72,32 55,44 30,50
        C -20,58 -60,40 -80,0 Z
      "/>
      <!-- Tail fin -->
      <path d="
        M -68,-6
        C -88,-32 -100,-50 -108,-58
        C -100,-36 -96,-14 -80,0
        C -96,18 -100,42 -108,64
        C -100,56 -88,36 -68,12
      "/>
      <!-- Dorsal fin -->
      <path d="
        M -10,-42
        C 0,-68 20,-76 38,-70
        C 28,-60 16,-50 10,-42
      "/>
      <!-- Pectoral fin -->
      <path d="
        M 20,8
        C 8,20 -4,32 -10,40
        C 0,34 14,24 24,14
      "/>
      <!-- Eye -->
      <circle cx="56" cy="2" r="4.5" fill="#A8833D" stroke="none" opacity="0.5"/>
      <circle cx="57.5" cy="1" r="1.5" fill="#F3EFE4" stroke="none" opacity="0.6"/>
      <!-- Gill line -->
      <path d="M 42,-14 C 36,-4 36,16 42,24" opacity="0.6"/>
    </g>
  </g>

  <!-- Decorative gilt hairline rules -->
  <line x1="320" y1="380" x2="480" y2="380" stroke="#C8A45A" stroke-width="0.5" opacity="0.2"/>
  <line x1="320" y1="600" x2="480" y2="600" stroke="#C8A45A" stroke-width="0.5" opacity="0.2"/>
</svg>
