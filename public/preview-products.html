async function checkImage(url) {
  try {
    const res = await fetch(url, { method: 'HEAD' });
    if (!res.ok) return { exists: false, size: 0 };
    const size = parseInt(res.headers.get('content-length') || '0');
    return { exists: true, size };
  } catch { return { exists: false, size: 0 }; }
}

function formatSize(bytes) {
  if (!bytes) return '—';
  return (bytes / 1024).toFixed(0) + ' KB';
}

async function init() {
  const grid = document.getElementById('grid');
  const stats = document.getElementById('stats');
  let success = 0, failed = 0, totalSize = 0;

  for (const p of products) {
    const imgUrl = p.url;
    const { exists, size } = await checkImage(imgUrl);
    if (exists) { success++; totalSize += size; } else { failed++; }

    const card = document.createElement('div');
    card.className = 'card' + (exists ? '' : ' missing');
    card.innerHTML = `
      <div class="img-wrap">
        ${exists
          ? `<img src="${imgUrl}" alt="${p.name}" loading="lazy">`
          : `<span>MISSING</span>`}
      </div>
      <div class="body">
        <div class="eyebrow">${exists ? (p.category || '') : 'FAILED'}</div>
        <div class="name">${p.name}</div>
        <div class="sci">${p.sci}</div>
        <div class="file">${imgUrl.split('/').pop()} <span class="size">${formatSize(size)}</span></div>
      </div>`;
    grid.appendChild(card);
  }

  stats.innerHTML = `
    <div class="stat">TOTAL<span>${products.length}</span></div>
    <div class="stat">SUCCESS<span style="color:#1A7A5C">${success}</span></div>
    <div class="stat">FAILED<span style="color:#E8622A">${failed}</span></div>
    <div class="stat">TOTAL SIZE<span>${(totalSize / 1024 / 1024).toFixed(1)} MB</span></div>`;
}
init();
</script>
